spring:
  datasource:
    url: jdbc:sqlite:${app.db-path:logs.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA journal_mode=WAL"
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  thymeleaf:
    cache: false
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true

server:
  port: 8080

app:
  aws:
    region: us-east-1
    bucket: ""
    prefix: ""
    profile: "default"
  db-path: logs.db

referer-filter:
  self-referers: []

uri-stem-filter:
  excluded-extensions:
    - .css
    - .js
    - .svg
    - .avif
    - .ico
    - .png
    - .jpg
    - .jpeg
    - .webp
    - .gif

ua-classifier:
  rules:
    # AI crawlers
    - pattern: "ClaudeBot"
      label: "ClaudeBot"
    - pattern: "Claude-SearchBot"
      label: "Claude-SearchBot"
    - pattern: "OAI-SearchBot"
      label: "OAI-SearchBot"
    - pattern: "PerplexityBot"
      label: "PerplexityBot"
    # SEO crawlers
    - pattern: "AhrefsBot"
      label: "AhrefsBot"
    - pattern: "SemrushBot"
      label: "SemrushBot"
    - pattern: "SERankingBacklinksBot"
      label: "SERankingBot"
    - pattern: "Barkrowler"
      label: "Barkrowler"
    - pattern: "DotBot"
      label: "DotBot"
    - pattern: "MJ12bot"
      label: "MJ12bot"
    - pattern: "ev-crawler"
      label: "HeadlineBot"
    - pattern: "PetalBot"
      label: "PetalBot"
    - pattern: "coccocbot"
      label: "CocCocBot"
    - pattern: "SeznamBot"
      label: "SeznamBot"
    # Search bots
    - pattern: "Googlebot"
      label: "Googlebot"
    - pattern: "GoogleImageProxy"
      label: "Google ImageProxy"
    - pattern: "FeedFetcher-Google"
      label: "Google FeedFetcher"
    - pattern: "bingbot"
      label: "Bingbot"
    - pattern: "YandexBot"
      label: "YandexBot"
    - pattern: "Baiduspider"
      label: "Baiduspider"
    - pattern: "DuckDuckBot"
      label: "DuckDuckBot"
    - pattern: "Qwantbot"
      label: "Qwantbot"
    # Security scanners
    - pattern: "WellKnownBot"
      label: "WellKnownBot"
    - pattern: "CensysInspect"
      label: "Censys Scanner"
    - pattern: "Palo Alto Networks"
      label: "Palo Alto Scanner"
    - pattern: "visionheight.com/scan"
      label: "VisionHeight Scanner"
    - pattern: "2ip bot"
      label: "2ip Scanner"
    # Feed readers
    - pattern: "Feedly"
      label: "Feedly"
    - pattern: "Feedbin"
      label: "Feedbin"
    - pattern: "Reeder/"
      label: "Reeder"
    - pattern: "FreshRSS"
      label: "FreshRSS"
    - pattern: "NewsBlur"
      label: "NewsBlur"
    - pattern: "rss-parser"
      label: "rss-parser"
    - pattern: "sfFeedReader"
      label: "sfFeedReader"
    - pattern: "feeder.co"
      label: "Feeder"
    - pattern: "flus/"
      label: "Flus"
    - pattern: "wp.com feedbot"
      label: "WP.com FeedBot"
    # Fediverse
    - pattern: "Mastodon"
      label: "Mastodon"
    - pattern: "Misskey/"
      label: "Misskey"
    - pattern: "SummalyBot"
      label: "SummalyBot"
    - pattern: "Yumechi"
      label: "Yumechi Proxy"
    # Social
    - pattern: "facebookexternalhit"
      label: "Facebook"
    # Apps
    - pattern: "obsidian/"
      label: "Obsidian"
    - pattern: "GSA/"
      label: "Google Search App"
    - pattern: "okhttp/"
      label: "okhttp"
    - pattern: "Go-http-client/"
      label: "Go HTTP client"
    # Headless/suspicious — must come before generic browser rules
    - pattern: "HeadlessChrome"
      label: "HeadlessChrome"