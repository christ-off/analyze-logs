<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('Probable Bots', ~{:: .extra-head}, ~{:: .page-content}, ~{:: .page-script})}">
<head><title>Probable Bots</title></head>
<th:block class="extra-head">
    <meta name="cf-from" th:content="${from}"/>
    <meta name="cf-to"   th:content="${to}"/>
</th:block>
<th:block class="page-content">

    <!-- Flash messages -->
    <div th:replace="~{fragments/flash :: messages}"></div>

    <!-- Date range bar -->
    <div class="card mb-4 cf-toolbar">
        <div class="card-body d-flex flex-wrap align-items-center gap-2">
            <span class="fw-semibold me-2">Range:</span>
            <a th:href="@{/probable-bots?range=1d}"  th:classappend="${activeRange == '1d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">Today</a>
            <a th:href="@{/probable-bots?range=7d}"  th:classappend="${activeRange == '7d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">7 days</a>
            <a th:href="@{/probable-bots?range=30d}" th:classappend="${activeRange == '30d'} ? ' active' : ''" class="btn btn-sm btn-outline-secondary">30 days</a>
            <a th:href="@{/probable-bots?range=3m}"  th:classappend="${activeRange == '3m'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">3 months</a>

            <form th:action="@{/probable-bots}" method="get" class="d-flex align-items-center gap-2 ms-2">
                <label for="fromDate" class="form-label mb-0 fw-semibold">Custom:</label>
                <input type="date" id="fromDate" name="from" class="form-control form-control-sm" th:value="${fromDate}" style="width:150px"/>
                <span>&ndash;</span>
                <input type="date" name="to"   class="form-control form-control-sm" th:value="${toDate}"   style="width:150px"/>
                <button type="submit" class="btn btn-sm btn-primary">Apply</button>
            </form>

            <!-- Bot filter toggle -->
            <div class="form-check form-switch ms-3 d-flex align-items-center gap-2">
                <input class="form-check-input" type="checkbox" role="switch" aria-checked="false"
                       id="toggleBots" style="width:2.5em; height:1.5em"/>
                <label class="form-check-label fw-semibold" for="toggleBots">Hide bots, apps &amp; noise</label>
            </div>
        </div>
    </div>

    <!-- Probable bots list -->
    <div class="card mb-4">
        <div class="card-header fw-semibold">Top Probable Bots</div>
        <div class="card-body p-0">
            <table class="table table-sm table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>User Agent</th>
                        <th class="text-end">Requests</th>
                    </tr>
                </thead>
                <tbody id="probableBotsTable">
                    <tr th:each="bot : ${probableBots}">
                        <td th:text="${bot.name}"></td>
                        <td class="text-end" th:text="${#numbers.formatInteger(bot.count, 1000)}"></td>
                    </tr>
                    <tr th:if="${probableBots.isEmpty()}">
                        <td colspan="2" class="text-center text-muted">No probable bots found for the selected date range.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</th:block>
<th:block class="page-script">
    <script type="module" th:src="@{/js/probable-bots.js}"></script>
</th:block>
</html>
