<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('Country Detail – ' + ${countryName}, ~{:: .extra-head}, ~{:: .page-content}, ~{:: .page-script})}">
<th:block class="extra-head">
    <meta name="cf-from"      th:content="${from}"/>
    <meta name="cf-to"        th:content="${to}"/>
    <meta name="cf-country"   th:content="${countryCode}"/>
</th:block>
<th:block class="page-content">

    <!-- info + date range bar -->
    <div class="card mb-4 cf-toolbar">
        <div class="card-body">
            <div class="d-flex align-items-center gap-3 mb-2">
                <div>
                    <div class="cf-detail-title" th:text="${countryName}">Country</div>
                    <div class="cf-detail-subtitle">
                        <span th:text="${fromDate}"></span> &rarr; <span th:text="${toDate}"></span>
                    </div>
                </div>
                <a th:href="@{/(from=${fromDate},to=${toDate})}"
                   class="btn btn-sm btn-outline-secondary ms-auto">&#8592; Back</a>
            </div>
            <div class="d-flex flex-wrap align-items-center gap-2">
                <span class="fw-semibold me-2">Range:</span>
                <a th:href="@{/country-detail(country=${countryCode},range='1d')}"  th:classappend="${activeRange == '1d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">Today</a>
                <a th:href="@{/country-detail(country=${countryCode},range='7d')}"  th:classappend="${activeRange == '7d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">7 days</a>
                <a th:href="@{/country-detail(country=${countryCode},range='30d')}" th:classappend="${activeRange == '30d'} ? ' active' : ''" class="btn btn-sm btn-outline-secondary">30 days</a>
                <a th:href="@{/country-detail(country=${countryCode},range='3m')}"  th:classappend="${activeRange == '3m'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">3 months</a>

                <form th:action="@{/country-detail}" method="get" class="d-flex align-items-center gap-2 ms-2">
                    <input type="hidden" name="country" th:value="${countryCode}"/>
                    <label for="fromDateCountry" class="form-label mb-0 fw-semibold">Custom:</label>
                    <input type="date" id="fromDateCountry" name="from" class="form-control form-control-sm" th:value="${fromDate}" style="width:150px"/>
                    <span>&ndash;</span>
                    <input type="date" name="to"   class="form-control form-control-sm" th:value="${toDate}"   style="width:150px"/>
                    <button type="submit" class="btn btn-sm btn-primary">Apply</button>
                </form>

                <!-- Bot filter toggle -->
                <div class="form-check form-switch ms-3 d-flex align-items-center gap-2">
                    <input class="form-check-input" type="checkbox" role="switch" aria-checked="false"
                           id="toggleBots" style="width:2.5em; height:1.5em"/>
                    <label class="form-check-label fw-semibold" for="toggleBots">Hide bots, apps &amp; noise</label>
                </div>
            </div>
        </div>
    </div>

    <!-- row 0: top URLs (full width, fixed height for readable labels) -->
    <div class="row g-4 mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header fw-semibold">Top URLs</div>
                <div class="card-body" style="position:relative;height:420px">
                    <canvas id="chartUriStems"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- row 1: top user agents (wide) + result types pie (narrow) -->
    <div class="row g-4 mb-4">
        <div class="col-xl-8">
            <div class="card h-100">
                <div class="card-header fw-semibold">Top User Agents</div>
                <div class="card-body"><canvas id="chartUaNames"></canvas></div>
            </div>
        </div>
        <div class="col-xl-4">
            <div class="card h-100">
                <div class="card-header fw-semibold">Result Types</div>
                <div class="card-body d-flex align-items-center justify-content-center" style="position:relative;height:280px">
                    <canvas id="chartResultTypes"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- row 2: requests per day (full width) -->
    <div class="row g-4 mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header fw-semibold">Requests per Day</div>
                <div class="card-body"><canvas id="chartRequestsPerDay"></canvas></div>
            </div>
        </div>
    </div>

</th:block>
<th:block class="page-script">
    <script type="module" th:src="@{/js/country-detail.js}"></script>
</th:block>
</html>
