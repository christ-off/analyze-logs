<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:fragment="page(title, extraHead, content, pageScript)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Dashboard</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <th:block th:replace="${extraHead}"/>
</head>
<body>
<div class="cf-shell">
    <aside class="cf-sidebar">
        <a class="cf-brand" th:href="@{/}">
            <span class="cf-brand-mark" aria-hidden="true"></span>
            <span class="cf-brand-text">CloudFront <em>Logs</em></span>
        </a>
        <nav class="cf-nav" aria-label="Main navigation">
            <span class="cf-nav-section">Analytics</span>
            <a class="cf-nav-link" th:href="@{/}" data-path="/">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="12" width="4" height="9" rx="1"/>
                    <rect x="10" y="7" width="4" height="14" rx="1"/>
                    <rect x="17" y="3" width="4" height="18" rx="1"/>
                </svg>
                Dashboard
            </a>
            <a class="cf-nav-link" th:href="@{/bot-analysis}" data-path="/bot-analysis">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="4" y="8" width="16" height="12" rx="2"/>
                    <path d="M12 8V4M8 4h8"/>
                    <circle cx="9" cy="13" r="1"/>
                    <circle cx="15" cy="13" r="1"/>
                    <path d="M9 17h6"/>
                </svg>
                Bot Analysis
            </a>
            <span class="cf-nav-section">System</span>
            <a class="cf-nav-link" th:href="@{/admin}" data-path="/admin">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M4 7h16M4 12h16M4 17h16"/>
                    <circle cx="9" cy="7" r="2" fill="currentColor" stroke="none"/>
                    <circle cx="15" cy="12" r="2" fill="currentColor" stroke="none"/>
                    <circle cx="7" cy="17" r="2" fill="currentColor" stroke="none"/>
                </svg>
                Admin
            </a>
        </nav>
        <div class="cf-sidebar-foot">
            <span class="cf-status-dot" aria-hidden="true"></span>
            edge telemetry · live
        </div>
    </aside>
    <main class="cf-main">
        <th:block th:replace="${content}"/>
    </main>
</div>
<script>
    (function () {
        const path = location.pathname;
        const links = document.querySelectorAll('.cf-nav-link');
        let active = links[0];
        links.forEach(link => {
            const p = link.dataset.path;
            if (p !== '/' && path.startsWith(p)) active = link;
        });
        if (active) active.classList.add('active');
    })();
</script>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/chart.js/dist/chart.umd.js}"></script>
<th:block th:replace="${pageScript}"/>
</body>
</html>
