<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'UA Detail – ' + ${uaName}">UA Detail</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <meta name="cf-from" th:content="${from}"/>
    <meta name="cf-to"   th:content="${to}"/>
    <meta name="cf-ua"   th:content="${uaName}"/>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">CloudFront Logs</a>
    </div>
</nav>

<main class="container-fluid px-4">

    <!-- info + date range bar -->
    <div class="card mb-4 cf-toolbar">
        <div class="card-body">
            <div class="d-flex align-items-center gap-3 mb-2">
                <div>
                    <div class="cf-detail-title" th:text="${uaName}">User Agent</div>
                    <div class="cf-detail-subtitle">
                        <span th:text="${fromDate}"></span> &rarr; <span th:text="${toDate}"></span>
                    </div>
                </div>
                <a th:href="@{/(from=${fromDate},to=${toDate})}"
                   class="btn btn-sm btn-outline-secondary ms-auto">&#8592; Back</a>
            </div>
            <div class="d-flex flex-wrap align-items-center gap-2">
                <span class="fw-semibold me-2">Range:</span>
                <a th:href="@{/ua-detail(ua=${uaName},range='1d')}"  th:classappend="${activeRange == '1d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">Today</a>
                <a th:href="@{/ua-detail(ua=${uaName},range='7d')}"  th:classappend="${activeRange == '7d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">7 days</a>
                <a th:href="@{/ua-detail(ua=${uaName},range='30d')}" th:classappend="${activeRange == '30d'} ? ' active' : ''" class="btn btn-sm btn-outline-secondary">30 days</a>
                <a th:href="@{/ua-detail(ua=${uaName},range='3m')}"  th:classappend="${activeRange == '3m'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">3 months</a>

                <form th:action="@{/ua-detail}" method="get" class="d-flex align-items-center gap-2 ms-2">
                    <input type="hidden" name="ua" th:value="${uaName}"/>
                    <label for="fromDateUa" class="form-label mb-0 fw-semibold">Custom:</label>
                    <input type="date" id="fromDateUa" name="from" class="form-control form-control-sm" th:value="${fromDate}" style="width:150px"/>
                    <span>&ndash;</span>
                    <input type="date" name="to"   class="form-control form-control-sm" th:value="${toDate}"   style="width:150px"/>
                    <button type="submit" class="btn btn-sm btn-primary">Apply</button>
                </form>

                <!-- Bot filter toggle -->
                <div class="form-check form-switch ms-3 d-flex align-items-center gap-2">
                    <input class="form-check-input" type="checkbox" role="switch" aria-checked="false"
                           id="toggleBots" style="width:2.5em; height:1.5em"/>
                    <label class="form-check-label fw-semibold" for="toggleBots">Hide bots, apps &amp; noise</label>
                </div>
            </div>
        </div>
    </div>

    <!-- user agents list -->
    <div class="card mb-4">
        <div class="card-header fw-semibold">User Agents</div>
        <div class="card-body p-0">
            <table class="table table-sm table-striped table-hover mb-0" id="tableUserAgents">
                <thead>
                    <tr>
                        <th style="width:2rem">#</th>
                        <th>User Agent</th>
                        <th class="text-end" style="width:6rem">Requests</th>
                        <th style="width:180px"></th>
                    </tr>
                </thead>
                <tbody id="tbodyUserAgents">
                    <tr><td colspan="4" class="text-center text-muted py-3">Loading…</td></tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer d-flex gap-3 flex-wrap py-2" id="uaBarLegend" style="display:none!important">
            <span class="d-flex align-items-center gap-1 small"><span style="width:12px;height:12px;border-radius:2px;background:rgba(40,167,69,0.8);display:inline-block"></span>Hit</span>
            <span class="d-flex align-items-center gap-1 small"><span style="width:12px;height:12px;border-radius:2px;background:rgba(54,162,235,0.8);display:inline-block"></span>Miss</span>
            <span class="d-flex align-items-center gap-1 small"><span style="width:12px;height:12px;border-radius:2px;background:rgba(253,126,20,0.8);display:inline-block"></span>Function</span>
            <span class="d-flex align-items-center gap-1 small"><span style="width:12px;height:12px;border-radius:2px;background:rgba(111,66,193,0.8);display:inline-block"></span>Redirect</span>
            <span class="d-flex align-items-center gap-1 small"><span style="width:12px;height:12px;border-radius:2px;background:rgba(220,53,69,0.8);display:inline-block"></span>Error</span>
        </div>
    </div>

    <!-- row 1: result types, countries, top URLs -->
    <div class="row g-4 mb-4">
        <div class="col-xl-4">
            <div class="card h-100">
                <div class="card-header fw-semibold">Result Types</div>
                <div class="card-body"><canvas id="chartResultTypes"></canvas></div>
            </div>
        </div>
        <div class="col-xl-4">
            <div class="card h-100">
                <div class="card-header fw-semibold">Countries</div>
                <div class="card-body"><canvas id="chartCountries"></canvas></div>
            </div>
        </div>
        <div class="col-xl-4">
            <div class="card h-100">
                <div class="card-header fw-semibold">Top URLs</div>
                <div class="card-body"><canvas id="chartUriStems"></canvas></div>
            </div>
        </div>
    </div>

    <!-- row 2: requests per day line chart -->
    <div class="row g-4 mb-4">
        <div class="col-xl-12">
            <div class="card h-100">
                <div class="card-header fw-semibold">Requests per Day</div>
                <div class="card-body"><canvas id="chartRequestsPerDay"></canvas></div>
            </div>
        </div>
    </div>

</main>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/chart.js/dist/chart.umd.js}"></script>
<script type="module" th:src="@{/js/ua-detail.js}"></script>
</body>
</html>
