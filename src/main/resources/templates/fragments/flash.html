<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Flash Messages</title></head>
<body>
<div th:fragment="messages">
    <div th:if="${flashMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${flashMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${flashError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${flashError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
</body>
</html>
