<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('CloudFront Dashboard', ~{:: .extra-head}, ~{:: .page-content}, ~{:: .page-script})}">
<head><title>CloudFront Dashboard</title></head>
<th:block class="extra-head">
    <meta name="cf-from" th:content="${from}"/>
    <meta name="cf-to"   th:content="${to}"/>
</th:block>
<th:block class="page-content">

    <!-- Flash messages -->
    <div th:replace="~{fragments/flash :: messages}"></div>

    <!-- Date range bar -->
    <div class="card mb-4 cf-toolbar">
        <div class="card-body d-flex flex-wrap align-items-center gap-2">
            <span class="fw-semibold me-2">Range:</span>
            <a th:href="@{/?range=1d}"  th:classappend="${activeRange == '1d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">Today</a>
            <a th:href="@{/?range=7d}"  th:classappend="${activeRange == '7d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">7 days</a>
            <a th:href="@{/?range=30d}" th:classappend="${activeRange == '30d'} ? ' active' : ''" class="btn btn-sm btn-outline-secondary">30 days</a>
            <a th:href="@{/?range=3m}"  th:classappend="${activeRange == '3m'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">3 months</a>

            <form th:action="@{/}" method="get" class="d-flex align-items-center gap-2 ms-2">
                <label for="fromDate" class="form-label mb-0 fw-semibold">Custom:</label>
                <input type="date" id="fromDate" name="from" class="form-control form-control-sm" th:value="${fromDate}" style="width:150px"/>
                <span>&ndash;</span>
                <input type="date" name="to"   class="form-control form-control-sm" th:value="${toDate}"   style="width:150px"/>
                <button type="submit" class="btn btn-sm btn-primary">Apply</button>
            </form>

            <!-- Bot filter toggle -->
            <div class="form-check form-switch ms-3 d-flex align-items-center gap-2">
                <input class="form-check-input" type="checkbox" role="switch" aria-checked="false"
                       id="toggleBots" style="width:2.5em; height:1.5em"/>
                <label class="form-check-label fw-semibold" for="toggleBots">Hide bots, apps &amp; noise</label>
            </div>

            <form th:action="@{/refresh}" method="post" class="ms-auto d-inline" id="refreshForm">
                <button type="submit" id="refreshBtn" class="btn btn-sm btn-warning">
                    <span id="refreshSpinner" class="spinner-border spinner-border-sm me-1 d-none" aria-hidden="true"></span>
                    Refresh from S3
                </button>
            </form>
            <script>
                document.getElementById('refreshForm').addEventListener('submit', function () {
                    const btn = document.getElementById('refreshBtn');
                    const spinner = document.getElementById('refreshSpinner');
                    btn.disabled = true;
                    spinner.classList.remove('d-none');
                });
            </script>
        </div>
    </div>

    <!-- Charts row 1: user agents + countries -->
    <div class="row g-4 mb-4">
        <div class="col-xl-6">
            <div class="card h-100">
                <div class="card-header fw-semibold">Top User Agents</div>
                <div class="card-body"><canvas id="chartUaNames"></canvas></div>
            </div>
        </div>
        <div class="col-xl-6">
            <div class="card h-100">
                <div class="card-header fw-semibold">Top Countries</div>
                <div class="card-body"><canvas id="chartCountries"></canvas></div>
            </div>
        </div>
    </div>

    <!-- Charts row 2: Top URLs full width -->
    <div class="row g-4 mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header fw-semibold">Top URLs</div>
                <div class="card-body" style="position:relative;height:420px">
                    <canvas id="chartTopUrls"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts row 3: UA groups (small pie) + referers (wide) -->
    <div class="row g-4 mb-4">
        <div class="col-xl-4">
            <div class="card h-100">
                <div class="card-header fw-semibold">User Agent Groups</div>
                <div class="card-body d-flex align-items-center justify-content-center" style="position:relative;height:280px">
                    <canvas id="chartUaGroups"></canvas>
                </div>
            </div>
        </div>
        <div class="col-xl-8">
            <div class="card h-100">
                <div class="card-header fw-semibold">Top Referers</div>
                <div class="card-body"><canvas id="chartReferers"></canvas></div>
            </div>
        </div>
    </div>

    <!-- Charts row 4: requests per day full width -->
    <div class="row g-4 mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header fw-semibold">Requests per Day</div>
                <div class="card-body"><canvas id="chartRequestsPerDay"></canvas></div>
            </div>
        </div>
    </div>

</th:block>
<th:block class="page-script">
    <script type="module" th:src="@{/js/dashboard.js}"></script>
</th:block>
</html>
