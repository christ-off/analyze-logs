<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'URL Detail – ' + ${urlName}">URL Detail</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <meta name="cf-from"  th:content="${from}"/>
    <meta name="cf-to"    th:content="${to}"/>
    <meta name="cf-url"   th:content="${urlName}"/>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">CloudFront Logs</a>
    </div>
</nav>

<main class="container-fluid px-4">

    <!-- info + date range bar -->
    <div class="card mb-4 cf-toolbar">
        <div class="card-body">
            <div class="d-flex align-items-center gap-3 mb-2">
                <div>
                    <div class="cf-detail-title" th:text="${urlName}">URL</div>
                    <div class="cf-detail-subtitle">
                        <span th:text="${fromDate}"></span> &rarr; <span th:text="${toDate}"></span>
                    </div>
                </div>
                <a th:href="@{/(from=${fromDate},to=${toDate})}"
                   class="btn btn-sm btn-outline-secondary ms-auto">&#8592; Back</a>
            </div>
            <div class="d-flex flex-wrap align-items-center gap-2">
                <span class="fw-semibold me-2">Range:</span>
                <a th:href="@{/url-detail(url=${urlName},range='1d')}"  th:classappend="${activeRange == '1d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">Today</a>
                <a th:href="@{/url-detail(url=${urlName},range='7d')}"  th:classappend="${activeRange == '7d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">7 days</a>
                <a th:href="@{/url-detail(url=${urlName},range='30d')}" th:classappend="${activeRange == '30d'} ? ' active' : ''" class="btn btn-sm btn-outline-secondary">30 days</a>
                <a th:href="@{/url-detail(url=${urlName},range='3m')}"  th:classappend="${activeRange == '3m'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">3 months</a>
                <form th:action="@{/url-detail}" method="get" class="d-flex align-items-center gap-2 ms-2">
                    <input type="hidden" name="url" th:value="${urlName}"/>
                    <label for="fromDateUrl" class="form-label mb-0 fw-semibold">Custom:</label>
                    <input type="date" id="fromDateUrl" name="from" class="form-control form-control-sm" th:value="${fromDate}" style="width:150px"/>
                    <span>&ndash;</span>
                    <input type="date" name="to" class="form-control form-control-sm" th:value="${toDate}" style="width:150px"/>
                    <button type="submit" class="btn btn-sm btn-primary">Apply</button>
                </form>
            </div>
        </div>
    </div>

    <!-- matching URI stems list -->
    <div class="card mb-4">
        <div class="card-header fw-semibold">URLs</div>
        <div class="card-body p-0">
            <table class="table table-sm table-striped table-hover mb-0" id="tableUrls">
                <thead>
                    <tr>
                        <th style="width:2rem">#</th>
                        <th>URI Stem</th>
                        <th class="text-end" style="width:8rem">Requests</th>
                    </tr>
                </thead>
                <tbody id="tbodyUrls">
                    <tr><td colspan="3" class="text-center text-muted py-3">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- row 1: Top Countries + Top User Agents -->
    <div class="row g-4 mb-4">
        <div class="col-xl-6">
            <div class="card h-100">
                <div class="card-header fw-semibold">Top Countries</div>
                <div class="card-body"><canvas id="chartCountries"></canvas></div>
            </div>
        </div>
        <div class="col-xl-6">
            <div class="card h-100">
                <div class="card-header fw-semibold">Top User Agents</div>
                <div class="card-body"><canvas id="chartUserAgents"></canvas></div>
            </div>
        </div>
    </div>

    <!-- row 2: Requests per Day -->
    <div class="row g-4 mb-4">
        <div class="col-xl-12">
            <div class="card h-100">
                <div class="card-header fw-semibold">Requests per Day</div>
                <div class="card-body"><canvas id="chartRequestsPerDay"></canvas></div>
            </div>
        </div>
    </div>

</main>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/chart.js/dist/chart.umd.js}"></script>
<script type="module" th:src="@{/js/url-detail.js}"></script>
</body>
</html>
