<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('Bot Analysis', ~{:: .extra-head}, ~{:: .page-content}, ~{:: .page-script})}">
<head><title>Bot Analysis</title></head>
<th:block class="extra-head">
    <meta name="cf-from" th:content="${from}"/>
    <meta name="cf-to"   th:content="${to}"/>
</th:block>
<th:block class="page-content">

    <!-- Flash messages -->
    <div th:replace="~{fragments/flash :: messages}"></div>

    <!-- Date range bar -->
    <div class="card mb-4 cf-toolbar">
        <div class="card-body d-flex flex-wrap align-items-center gap-2">
            <span class="fw-semibold me-2">Range:</span>
            <a th:href="@{/bot-analysis?range=1d}"  th:classappend="${activeRange == '1d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">Today</a>
            <a th:href="@{/bot-analysis?range=7d}"  th:classappend="${activeRange == '7d'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">7 days</a>
            <a th:href="@{/bot-analysis?range=30d}" th:classappend="${activeRange == '30d'} ? ' active' : ''" class="btn btn-sm btn-outline-secondary">30 days</a>
            <a th:href="@{/bot-analysis?range=3m}"  th:classappend="${activeRange == '3m'}  ? ' active' : ''" class="btn btn-sm btn-outline-secondary">3 months</a>

            <form th:action="@{/bot-analysis}" method="get" class="d-flex align-items-center gap-2 ms-2">
                <label for="fromDate" class="form-label mb-0 fw-semibold">Custom:</label>
                <input type="date" id="fromDate" name="from" class="form-control form-control-sm" th:value="${fromDate}" style="width:150px"/>
                <span>&ndash;</span>
                <input type="date" name="to"   class="form-control form-control-sm" th:value="${toDate}"   style="width:150px"/>
                <button type="submit" class="btn btn-sm btn-primary">Apply</button>
            </form>

            <!-- Bot filter toggle -->
            <div class="form-check form-switch ms-3 d-flex align-items-center gap-2">
                <input class="form-check-input" type="checkbox" role="switch" aria-checked="false"
                       id="toggleBots" style="width:2.5em; height:1.5em"/>
                <label class="form-check-label fw-semibold" for="toggleBots">Hide bots, apps &amp; noise</label>
            </div>
        </div>
    </div>

    <!-- Bot traffic over time (line chart) -->
    <div class="row g-4 mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header fw-semibold">Bot vs Human Traffic Over Time</div>
                <div class="card-body"><canvas id="chartBotHumanDaily"></canvas></div>
            </div>
        </div>
    </div>


</th:block>
<th:block class="page-script">
    <script type="module" th:src="@{/js/bot-analysis.js}"></script>
</th:block>
</html>
